<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스니핏 — 매일 아침 5분, 오늘의 핵심</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:#1C2B4A; --sky:#EAF3FB; --skycard:#D6E8F5;
    --blue:#2563EB; --bluel:#DBEAFE; --blued:#1E40AF;
    --green:#D1FAE5; --greend:#065F46;
    --white:#FFFFFF; --gray2:#64748B; --gray3:#94A3B8; --gray4:#CBD5E1;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Noto Sans KR',sans-serif; background:linear-gradient(135deg,#1C2B4A 0%,#2C3E63 50%,#1a3a5c 100%); min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:40px 20px; }

  .phone { width:390px; min-height:844px; background:var(--sky); border-radius:44px; overflow:hidden; box-shadow:0 40px 120px rgba(0,0,0,0.5),0 0 0 10px #2C2C2C,0 0 0 12px #1A1A1A; display:flex; flex-direction:column; }
  .status-bar { background:var(--sky); padding:14px 24px 8px; display:flex; justify-content:space-between; align-items:center; flex-shrink:0; }
  .header { background:var(--navy); padding:16px 24px 22px; border-radius:0 0 28px 28px; flex-shrink:0; }
  .header-row { display:flex; justify-content:space-between; align-items:center; }
  .app-name { font-size:28px; font-weight:900; color:var(--white); letter-spacing:-1px; }
  .header-sub { font-size:13px; color:rgba(255,255,255,0.6); margin-top:4px; }
  .date-badge { background:rgba(255,255,255,0.15); border-radius:10px; padding:7px 14px; margin-top:12px; display:inline-block; }
  .date-text { font-size:13px; color:rgba(255,255,255,0.9); font-weight:600; }
  .progress-wrap { margin-top:12px; display:flex; align-items:center; gap:10px; }
  .progress-bar { flex:1; height:4px; background:rgba(255,255,255,0.2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--white); border-radius:2px; transition:width 0.4s; }
  .progress-text { font-size:12px; color:rgba(255,255,255,0.8); font-weight:700; white-space:nowrap; }

  .scroll { flex:1; padding:16px; overflow-y:auto; }
  .scroll::-webkit-scrollbar { display:none; }
  .section-lbl { font-size:15px; font-weight:700; color:var(--navy); margin-bottom:14px; }

  .card { background:var(--white); border-radius:18px; padding:18px; margin-bottom:14px; border:1px solid var(--skycard); cursor:pointer; transition:transform 0.15s,box-shadow 0.15s; }
  .card:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(28,43,74,0.12); }
  .card.read { opacity:0.7; }
  .card.locked { cursor:default; }
  .card.locked:hover { transform:none; box-shadow:none; }
  .card-top { display:flex; align-items:center; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .card-num { font-size:12px; color:var(--gray3); margin-left:auto; font-weight:600; }
  .card-title { font-size:17px; font-weight:800; color:var(--navy); line-height:1.5; margin-bottom:12px; }
  .summary-box { background:var(--sky); border-radius:12px; padding:12px; display:flex; flex-direction:column; gap:6px; }
  .summary-line { display:flex; gap:10px; align-items:flex-start; }
  .dot { font-size:14px; font-weight:800; color:var(--blue); min-width:18px; flex-shrink:0; }
  .summary-text { font-size:14px; color:var(--navy); line-height:1.55; }
  .card-footer { display:flex; justify-content:space-between; align-items:center; margin-top:12px; }
  .card-cta { font-size:13px; font-weight:700; color:var(--blue); cursor:pointer; }
  .card-cta.locked { color:var(--gray3); cursor:default; }
  .share-btn { background:var(--sky); border:1px solid var(--skycard); border-radius:20px; padding:6px 14px; font-size:12px; font-weight:700; color:var(--navy); cursor:pointer; font-family:inherit; }
  .share-btn:hover { background:var(--skycard); }

  /* 잠금 오버레이 */
  .lock-overlay { background:linear-gradient(to bottom, rgba(234,243,251,0) 0%, rgba(234,243,251,0.95) 40%, rgba(234,243,251,1) 100%); border-radius:0 0 18px 18px; padding:20px 18px 18px; text-align:center; margin:-18px -18px -18px; margin-top:0; }
  .lock-icon { font-size:28px; margin-bottom:8px; }
  .lock-title { font-size:15px; font-weight:800; color:var(--navy); margin-bottom:4px; }
  .lock-sub { font-size:13px; color:var(--gray2); margin-bottom:14px; line-height:1.5; }
  .lock-kakao-btn { background:#FEE500; border:none; border-radius:12px; padding:12px 20px; font-size:15px; font-weight:800; color:#191919; cursor:pointer; font-family:inherit; width:100%; }

  .badge { border-radius:8px; padding:4px 10px; font-size:12px; font-weight:700; display:inline-block; }
  .badge-econ { background:var(--bluel); color:var(--blued); }
  .badge-pol  { background:var(--green); color:var(--greend); }
  .badge-easy { background:#D1FAE5; color:#065F46; }
  .badge-mid  { background:#FEF3C7; color:#92400E; }
  .badge-hard { background:#FEE2E2; color:#991B1B; }
  .badge-trust { background:var(--bluel); color:var(--blued); }

  .detail-header { background:var(--navy); padding:16px 24px 20px; border-radius:0; flex-shrink:0; }
  .back-btn { font-size:22px; color:var(--white); cursor:pointer; background:none; border:none; font-family:inherit; }
  .detail-title { font-size:18px; font-weight:800; color:var(--white); line-height:1.5; margin-top:10px; }
  .detail-card { background:var(--white); border-radius:16px; padding:16px; margin-bottom:14px; border:1px solid var(--skycard); }
  .detail-lbl { font-size:12px; font-weight:700; color:var(--gray2); margin-bottom:10px; }
  .impact-card { background:var(--bluel); border-radius:16px; padding:16px; margin-bottom:14px; }
  .share-card { background:#F0FDF4; border:1px solid #D1FAE5; border-radius:16px; padding:16px; margin-bottom:14px; cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .share-card:hover { background:#D1FAE5; }
  .term-answer { font-size:15px; color:var(--navy); margin-top:10px; line-height:1.6; display:none; }
  .source-row { font-size:12px; color:var(--gray3); margin-bottom:20px; }
  .link-card { cursor:pointer; display:flex; justify-content:space-between; align-items:center; }
  .link-card:hover { background:var(--sky); }

  /* 상세 잠금 화면 */
  .detail-locked { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px 24px; text-align:center; gap:16px; }
  .detail-locked-icon { font-size:56px; }
  .detail-locked-title { font-size:20px; font-weight:800; color:var(--navy); }
  .detail-locked-sub { font-size:15px; color:var(--gray2); line-height:1.6; }
  .detail-kakao-btn { background:#FEE500; border:none; border-radius:14px; padding:16px; font-size:17px; font-weight:800; color:#191919; cursor:pointer; font-family:inherit; width:100%; }
  .detail-guest-btn { background:var(--sky); border:1px solid var(--skycard); border-radius:14px; padding:14px; font-size:15px; font-weight:700; color:var(--gray2); cursor:pointer; font-family:inherit; width:100%; }

  .tab-bar { background:var(--white); border-top:1px solid var(--skycard); padding:10px 0 20px; display:flex; flex-shrink:0; }
  .tab-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:4px 0; }
  .tab-icon { font-size:22px; color:var(--gray4); }
  .tab-icon.on { color:var(--navy); }
  .tab-label { font-size:11px; color:var(--gray4); font-weight:600; }
  .tab-label.on { color:var(--navy); font-weight:700; }
  .tab-dot { width:5px; height:5px; background:var(--navy); border-radius:50%; }

  .setting-card { background:var(--white); border-radius:16px; padding:18px; margin-bottom:14px; border:1px solid var(--skycard); }
  .setting-title { font-size:16px; font-weight:700; color:var(--navy); margin-bottom:12px; }
  .font-row { display:flex; gap:10px; }
  .font-btn { flex:1; background:var(--sky); border-radius:12px; padding:10px; text-align:center; cursor:pointer; border:none; font-family:inherit; font-weight:700; color:var(--gray2); transition:all 0.15s; }
  .font-btn.on { background:var(--navy); color:var(--white); }
  .interest-tag { background:var(--sky); border-radius:24px; padding:8px 16px; font-size:14px; font-weight:600; color:var(--gray2); cursor:pointer; border:none; font-family:inherit; transition:all 0.15s; }
  .interest-tag.on { background:var(--navy); color:var(--white); }
  .alarm-time-display { font-size:34px; font-weight:800; color:var(--navy); margin-top:4px; cursor:pointer; padding:4px 0; border-bottom:2px dashed var(--skycard); display:inline-block; }
  .alarm-time-display:hover { border-color:var(--blue); }
  .toggle { width:52px; height:30px; background:var(--gray4); border-radius:15px; padding:3px; cursor:pointer; display:flex; align-items:center; border:none; transition:background 0.2s; }
  .toggle.on { background:var(--navy); justify-content:flex-end; }
  .toggle-thumb { width:24px; height:24px; background:var(--white); border-radius:50%; }
  .premium-card { background:var(--navy); border-radius:16px; padding:18px; margin-bottom:14px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }

  /* 모달 */
  .modal-overlay { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); display:flex; align-items:flex-end; z-index:100; border-radius:44px; }
  .modal-sheet { background:var(--white); border-radius:24px 24px 0 0; padding:24px; width:100%; }
  .modal-title { font-size:18px; font-weight:800; color:var(--navy); margin-bottom:20px; text-align:center; }
  .time-picker { display:flex; justify-content:center; align-items:center; gap:8px; margin-bottom:24px; }
  .time-col { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .time-col-label { font-size:12px; color:var(--gray3); font-weight:600; }
  .time-select { font-size:36px; font-weight:800; color:var(--navy); border:none; background:var(--sky); border-radius:12px; padding:10px 16px; font-family:inherit; width:90px; text-align:center; cursor:pointer; }
  .time-sep { font-size:36px; font-weight:800; color:var(--navy); margin-top:18px; }
  .modal-btn-row { display:flex; gap:10px; }
  .modal-cancel { flex:1; padding:14px; border-radius:14px; border:1px solid var(--skycard); background:var(--sky); font-size:16px; font-weight:700; color:var(--gray2); cursor:pointer; font-family:inherit; }
  .modal-confirm { flex:2; padding:14px; border-radius:14px; border:none; background:var(--navy); font-size:16px; font-weight:700; color:var(--white); cursor:pointer; font-family:inherit; }

  /* 로그인 */
  .login-screen { flex:1; display:flex; flex-direction:column; }
  .login-hero { background:var(--navy); padding:48px 32px 40px; display:flex; flex-direction:column; align-items:center; text-align:center; }
  .login-logo { font-size:36px; font-weight:900; color:var(--white); letter-spacing:-1px; margin-bottom:8px; }
  .login-tagline { font-size:15px; color:rgba(255,255,255,0.7); line-height:1.6; }
  .login-preview { flex:1; padding:24px; display:flex; flex-direction:column; gap:12px; }
  .preview-item { background:var(--white); border-radius:14px; padding:14px 16px; border:1px solid var(--skycard); display:flex; align-items:center; gap:12px; }
  .preview-text { font-size:14px; color:var(--navy); font-weight:600; }
  .preview-sub { font-size:12px; color:var(--gray3); margin-top:2px; }
  .login-bottom { padding:20px 24px 32px; display:flex; flex-direction:column; gap:10px; }
  .kakao-btn { background:#FEE500; border:none; border-radius:14px; padding:16px; display:flex; align-items:center; justify-content:center; gap:10px; font-size:17px; font-weight:800; color:#191919; cursor:pointer; font-family:inherit; }
  .kakao-btn:hover { opacity:0.9; }
  .guest-btn { background:var(--sky); border:1px solid var(--skycard); border-radius:14px; padding:14px; font-size:15px; font-weight:700; color:var(--gray2); cursor:pointer; font-family:inherit; }
  .guest-note { font-size:12px; color:var(--gray3); text-align:center; }

  .empty { display:flex; flex-direction:column; align-items:center; padding:60px 20px; text-align:center; gap:16px; }
  .toast { position:fixed; bottom:40px; left:50%; transform:translateX(-50%) translateY(100px); background:var(--navy); color:var(--white); padding:14px 24px; border-radius:30px; font-size:14px; font-weight:700; opacity:0; transition:all 0.3s; z-index:999; white-space:nowrap; pointer-events:none; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

@media (max-width: 480px) {
  body { background:var(--sky); padding:0; align-items:stretch; }
  .phone { width:100% !important; min-height:100vh !important; border-radius:0 !important; box-shadow:none !important; }
  .status-bar { display:none !important; }
  .header { border-radius:0 !important; }
  .detail-header { border-radius:0 !important; }
}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="status-bar">
    <span style="font-size:15px;font-weight:700;color:var(--navy)" id="clock">07:00</span>
    <span style="font-size:12px;color:var(--navy)">●●● ▌</span>
  </div>
  <div id="screen" style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;"></div>
  <div class="tab-bar" id="tabbar" style="display:none;">
    <div class="tab-item" onclick="switchTab('home')">
      <span class="tab-icon on" id="ti-home">⌂</span>
      <span class="tab-label on" id="tl-home">홈</span>
      <div class="tab-dot" id="td-home"></div>
    </div>
    <div class="tab-item" onclick="switchTab('saved')">
      <span class="tab-icon" id="ti-saved">🔖</span>
      <span class="tab-label" id="tl-saved">저장</span>
      <div style="height:5px"></div>
    </div>
    <div class="tab-item" onclick="switchTab('setting')">
      <span class="tab-icon" id="ti-setting">👤</span>
      <span class="tab-label" id="tl-setting">내 설정</span>
      <div style="height:5px"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://xglszfrjbcsmypxxjegq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhnbHN6ZnJqYmNzbXlweHhqZWdxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODI0OTUsImV4cCI6MjA5NDk1ODQ5NX0.q2yzXfKCui_g2eBuBWeitbh5Lrp_WMcbl7KEjryowXE';

let NEWS = [];

async function loadNews() {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/news?select=*&order=created_at.desc', {
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY
      }
    });
    const data = await res.json();
    if (data && data.length > 0) {
      NEWS = data.map(function(item, i) {
        return {
          id: item.id,
          category: item.category,
          difficulty: '보통',
          title: item.title,
          points: [item.point1, item.point2, item.point3],
          impact: item.impact,
          source: item.source,
          time: '오늘',
          term: item.term || '',
          termDesc: item.term_desc || '',
          url: item.url || 'https://www.yna.co.kr'
        };
      });
    }
  } catch(e) {
    console.log('뉴스 로드 실패:', e);
  }
}

// 게스트: 카드 3개, 상세 1개 / 로그인: 전체
let tab='home', readIds=[], savedIds=[], selectedNews=null;
let alarmHour=7, alarmMin=0, alarmOn=true;
let activeInterests=['경제·재테크','정치·사회'], fontSize=16;
let isLoggedIn=false, isGuest=false;
let guestDetailUsed=false; // 게스트가 상세 1개 썼는지

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`;
}
updateClock(); setInterval(updateClock,1000);

function badge(cls,text){return `<span class="badge ${cls}">${text}</span>`;}
function catBadge(cat){return badge(cat==='경제'?'badge-econ':'badge-pol',cat);}
function diffBadge(d){const m={'쉬움':'badge-easy','보통':'badge-mid','심화':'badge-hard'};return badge(m[d]||'badge-mid',d);}
function trustBadge(src){const t={'연합뉴스':1,'조선일보':1,'한국경제':1,'매일경제':1};return t[src]?badge('badge-trust','★ 검증'):'';}

function shareText(item){
  const d=new Date();const ds=`${d.getMonth()+1}월 ${d.getDate()}일`;
  return `📰 [뉴스니핏] ${ds} 뉴스 브리핑\n\n${item.category} | ${item.title}\n\n${item.points.map((p,i)=>`${i+1}. ${p}`).join('\n')}\n\n👉 ${item.impact}\n\n출처: ${item.source}\n─────────────────\n뉴스니핏 — 매일 아침 5분, 오늘의 핵심 뉴스`;
}
function doShare(item){
  if(navigator.clipboard){navigator.clipboard.writeText(shareText(item)).then(()=>showToast('📋 카카오톡에 붙여넣기 하세요!'));}
  else showToast('📋 공유 텍스트가 복사됐어요!');
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── 로그인 ──────────────────────────────────
function renderLogin(){
  document.getElementById('tabbar').style.display='none';
  document.getElementById('screen').innerHTML=`
    <div class="login-screen">
      <div class="login-hero">
        <div style="font-size:48px;margin-bottom:16px">📰</div>
        <div class="login-logo">뉴스니핏</div>
        <div class="login-tagline">매일 아침 5분<br>오늘의 핵심 뉴스만 골라드려요</div>
      </div>
      <div class="login-preview">
        <div class="preview-item"><span style="font-size:24px">⚡</span><div><div class="preview-text">AI 3줄 요약</div><div class="preview-sub">복잡한 뉴스를 핵심만 빠르게</div></div></div>
        <div class="preview-item"><span style="font-size:24px">🔔</span><div><div class="preview-text">매일 아침 브리핑</div><div class="preview-sub">원하는 시간에 자동으로 받아보기</div></div></div>
        <div class="preview-item"><span style="font-size:24px">★</span><div><div class="preview-text">검증된 언론사만</div><div class="preview-sub">연합뉴스, 조선일보, 한국경제 등</div></div></div>
        <div class="preview-item"><span style="font-size:24px">💬</span><div><div class="preview-text">카카오톡 공유</div><div class="preview-sub">중요한 뉴스를 지인과 바로 공유</div></div></div>
      </div>
      <div class="login-bottom">
        <button class="kakao-btn" onclick="doKakaoLogin()"><span style="font-size:22px">💬</span>카카오톡으로 시작하기</button>
        <button class="guest-btn" onclick="doGuestLogin()">로그인 없이 맛보기 (뉴스 3개 · 상세 1회)</button>
        <div class="guest-note">카카오 로그인 시 개인정보는 안전하게 보호됩니다</div>
      </div>
    </div>
  `;
}

function doKakaoLogin(){
  showToast('카카오 로그인 연동 중... (개발 예정)');
  setTimeout(()=>{isLoggedIn=true;isGuest=false;guestDetailUsed=false;render();},800);
}
function doGuestLogin(){isGuest=true;isLoggedIn=false;guestDetailUsed=false;render();}

// ── 홈 ──────────────────────────────────────
function renderHome(el){
  const today=new Date();
  const days=['일','월','화','수','목','금','토'];
  const ds=`${today.getMonth()+1}월 ${today.getDate()}일 ${days[today.getDay()]}요일`;
  const visibleNews=isGuest?NEWS.slice(0,3):NEWS;
  const readCount=readIds.filter(id=>visibleNews.find(n=>n.id===id)).length;
  const pct=Math.round((readCount/visibleNews.length)*100);

  el.innerHTML=`
    <div class="header">
      <div class="header-row">
        <span class="app-name">뉴스니핏</span>
        <span style="font-size:22px;cursor:pointer" onclick="switchTab('setting')">🔔</span>
      </div>
      <div class="header-sub">${isGuest?'👋 맛보기 중 — 카드 3개·상세 1회 무료':'오늘의 핵심만 골라드려요'}</div>
      <div class="date-badge"><span class="date-text">${ds} · ${visibleNews.length}가지 브리핑</span></div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <span class="progress-text">${readCount}/${visibleNews.length} 완료</span>
      </div>
    </div>
    <div class="scroll">
      <div class="section-lbl">오늘 꼭 알아야 할 뉴스</div>
      ${visibleNews.map((item,i)=>`
        <div class="card ${readIds.includes(item.id)?'read':''}">
          <div class="card-top">
            ${catBadge(item.category)}${diffBadge(item.difficulty)}${trustBadge(item.source)}
            <span class="card-num">${i+1}/${visibleNews.length} ${readIds.includes(item.id)?'✓':''}</span>
          </div>
          <div class="card-title" onclick="openDetail(${item.id})" style="cursor:pointer">${item.title}</div>
          <div class="summary-box">
            ${item.points.map((p,j)=>`<div class="summary-line"><span class="dot">${j+1}</span><span class="summary-text">${p}</span></div>`).join('')}
          </div>
          <div class="card-footer">
            <span class="card-cta" onclick="openDetail(${item.id})">자세히 보기 →</span>
            <button class="share-btn" onclick="doShare(NEWS[${i}])">카톡 공유 📤</button>
          </div>
        </div>
      `).join('')}
      ${isGuest?`
        <div style="background:var(--navy);border-radius:18px;padding:24px;text-align:center;margin-bottom:14px;">
          <div style="font-size:22px;margin-bottom:10px">🔒</div>
          <div style="font-size:16px;font-weight:800;color:#fff;margin-bottom:6px">나머지 ${NEWS.length-3}개 뉴스 더 보기</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:16px;line-height:1.5">카카오톡으로 가입하면 전체 뉴스와<br>모든 기능을 무료로 이용할 수 있어요</div>
          <button onclick="doKakaoLogin()" style="background:#FEE500;border:none;border-radius:12px;padding:12px 24px;font-size:15px;font-weight:800;color:#191919;cursor:pointer;font-family:inherit;width:100%">💬 카카오톡으로 시작하기</button>
        </div>
      `:''}
    </div>
  `;
}

// ── 상세 ──────────────────────────────────────
function openDetail(id){
  const item=NEWS.find(n=>n.id===id);
  // 게스트: 이미 상세 1개 봤으면 잠금
  if(isGuest && guestDetailUsed && !readIds.includes(id)){
    selectedNews=item; renderLockedDetail(); return;
  }
  selectedNews=item;
  if(!readIds.includes(id)) readIds.push(id);
  if(isGuest) guestDetailUsed=true;
  render();
}

function renderLockedDetail(){
  document.getElementById('tabbar').style.display='none';
  document.getElementById('screen').innerHTML=`
    <div class="detail-header">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button class="back-btn" onclick="closeDetail()">←</button>
        <span style="font-size:16px;font-weight:700;color:#fff">뉴스 상세</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${catBadge(selectedNews.category)}${diffBadge(selectedNews.difficulty)}${trustBadge(selectedNews.source)}
      </div>
      <div class="detail-title">${selectedNews.title}</div>
    </div>
    <div class="detail-locked">
      <div class="detail-locked-icon">🔒</div>
      <div class="detail-locked-title">상세 보기는 1회 무료예요</div>
      <div class="detail-locked-sub">카카오톡으로 가입하면<br>모든 뉴스 상세를 무제한으로<br>볼 수 있어요</div>
      <button class="detail-kakao-btn" onclick="doKakaoLogin()">💬 카카오톡으로 시작하기</button>
      <button class="detail-guest-btn" onclick="closeDetail()">← 돌아가기</button>
    </div>
  `;
}

function renderDetail(el){
  const item=selectedNews;
  el.innerHTML=`
    <div class="detail-header">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <button class="back-btn" onclick="closeDetail()">←</button>
        <span style="font-size:16px;font-weight:700;color:#fff">뉴스 상세</span>
        <div style="margin-left:auto;display:flex;gap:12px">
          <span style="cursor:pointer;font-size:22px" onclick="doShare(selectedNews)">📤</span>
          <span style="cursor:pointer;font-size:22px" onclick="toggleSave(${item.id})">${savedIds.includes(item.id)?'🔖':'📌'}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
        ${catBadge(item.category)}${diffBadge(item.difficulty)}${trustBadge(item.source)}
      </div>
      <div class="detail-title">${item.title}</div>
    </div>
    <div class="scroll">
      <div class="detail-card">
        <div class="detail-lbl">핵심 정리</div>
        ${item.points.map((p,i)=>`<div class="summary-line" style="margin-bottom:8px"><span class="dot">${i+1}</span><span class="summary-text" style="font-size:15px;color:var(--navy)">${p}</span></div>`).join('')}
      </div>
      <div class="impact-card">
        <div class="detail-lbl" style="color:var(--blued)">나에게 어떤 의미?</div>
        <div style="font-size:15px;color:var(--blued);line-height:1.65">${item.impact}</div>
      </div>
      <div class="detail-card" onclick="toggleTerm(this)" style="cursor:pointer">
        <div class="detail-lbl">이 단어가 궁금하다면</div>
        <div style="font-size:15px;color:var(--blue);font-weight:700">${item.term} ▼</div>
        <div class="term-answer">${item.termDesc}</div>
      </div>
      <div class="detail-card link-card" onclick="window.open('${item.url}','_blank')">
        <div>
          <div class="detail-lbl">원문 기사 보기</div>
          <div style="font-size:15px;color:var(--blue);font-weight:700">${item.source} →</div>
        </div>
        <span style="font-size:24px">🔗</span>
      </div>
      <div class="share-card" onclick="doShare(selectedNews)">
        <div>
          <div class="detail-lbl" style="color:var(--greend)">카카오톡으로 공유하기</div>
          <div style="font-size:15px;color:var(--greend);font-weight:700">지인에게 보내기 📤</div>
        </div>
        <span style="font-size:28px">💬</span>
      </div>
      <div class="source-row">출처: ${item.source} · ${item.time}</div>
    </div>
  `;
}

// ── 저장 ──────────────────────────────────────
function renderSaved(el){
  const saved=NEWS.filter(n=>savedIds.includes(n.id));
  el.innerHTML=`
    <div class="header">
      <div class="app-name" style="font-size:26px">저장한 뉴스</div>
      <div class="header-sub">${saved.length}개 저장됨</div>
    </div>
    <div class="scroll">
      ${saved.length===0?`
        <div class="empty">
          <div style="font-size:56px">🔖</div>
          <div style="font-size:16px;color:var(--gray2);line-height:1.6">저장한 뉴스가 없어요<br>뉴스 카드에서 저장해보세요</div>
        </div>
      `:saved.map(item=>`
        <div class="card" onclick="openDetail(${item.id})">
          <div class="card-top">${catBadge(item.category)}${trustBadge(item.source)}<span class="card-num">${item.time}</span></div>
          <div class="card-title">${item.title}</div>
          <div class="card-footer">
            <span class="card-cta">자세히 보기 →</span>
            <button class="share-btn" onclick="event.stopPropagation();doShare(NEWS.find(n=>n.id===${item.id}))">카톡 공유 📤</button>
          </div>
        </div>
      `).join('')}
    </div>
  `;
}

// ── 설정 ──────────────────────────────────────
function renderSetting(el){
  const all=['경제·재테크','정치·사회','건강·의료','부동산','국제'];
  const hh=String(alarmHour).padStart(2,'0'), mm=String(alarmMin).padStart(2,'0');
  el.innerHTML=`
    <div class="header">
      <div class="app-name" style="font-size:26px">내 설정</div>
      <div class="header-sub">나에게 맞는 뉴스니핏</div>
    </div>
    <div class="scroll">
      <div class="setting-card">
        <div class="setting-title">글씨 크기</div>
        <div class="font-row">
          <button class="font-btn ${fontSize===14?'on':''}" onclick="setFont(14)" style="font-size:14px">작게</button>
          <button class="font-btn ${fontSize===16?'on':''}" onclick="setFont(16)" style="font-size:16px">보통</button>
          <button class="font-btn ${fontSize===19?'on':''}" onclick="setFont(19)" style="font-size:19px">크게</button>
        </div>
      </div>
      <div class="setting-card">
        <div class="setting-title">관심 분야</div>
        <div style="display:flex;flex-wrap:wrap;gap:8px">
          ${all.map(i=>`<button class="interest-tag ${activeInterests.includes(i)?'on':''}" onclick="toggleInterest('${i}')">${i}</button>`).join('')}
        </div>
      </div>
      <div class="setting-card">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div>
            <div class="setting-title">아침 브리핑 알림</div>
            <div class="alarm-time-display" onclick="openTimeModal()">${hh}:${mm}</div>
            <div style="font-size:13px;color:var(--gray3);margin-top:6px">탭하면 시간을 바꿀 수 있어요</div>
          </div>
          <button class="toggle ${alarmOn?'on':''}" onclick="alarmOn=!alarmOn;this.classList.toggle('on');showToast(alarmOn?'알림 켜짐 🔔':'알림 꺼짐 🔕')">
            <div class="toggle-thumb"></div>
          </button>
        </div>
      </div>
      ${isLoggedIn?`
        <div class="premium-card">
          <div>
            <div style="font-size:16px;font-weight:700;color:#fff">프리미엄 이용 중</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px">월 3,900원 · 다음 결제 6월 1일</div>
          </div>
          <span style="font-size:30px">👑</span>
        </div>
      `:`
        <div class="premium-card" onclick="doKakaoLogin()">
          <div>
            <div style="font-size:16px;font-weight:700;color:#fff">카카오 로그인하고 전체 이용</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.6);margin-top:4px">월 3,900원 · 지금 가입하면 7일 무료</div>
          </div>
          <span style="font-size:30px">👑</span>
        </div>
      `}
      <button style="background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--skycard);text-align:center;font-size:16px;color:var(--gray2);cursor:pointer;font-family:inherit;width:100%" onclick="showToast('이메일: newsnfit@gmail.com')">고객센터 문의</button>
      ${isLoggedIn||isGuest?`<button style="background:#fff;border-radius:16px;padding:18px;margin-bottom:14px;border:1px solid var(--skycard);text-align:center;font-size:16px;color:#991B1B;cursor:pointer;font-family:inherit;width:100%" onclick="logout()">로그아웃</button>`:''}
    </div>
  `;
}

// ── 시간 모달 ──────────────────────────────────
function openTimeModal(){
  const screen=document.getElementById('screen');
  const old=document.getElementById('time-modal'); if(old) old.remove();
  const hours=[...Array(24)].map((_,i)=>String(i).padStart(2,'0'));
  const mins=[...Array(12)].map((_,i)=>String(i*5).padStart(2,'0'));
  const modal=document.createElement('div');
  modal.className='modal-overlay'; modal.id='time-modal';
  modal.innerHTML=`
    <div class="modal-sheet">
      <div class="modal-title">브리핑 알림 시간 설정</div>
      <div class="time-picker">
        <div class="time-col">
          <div class="time-col-label">시</div>
          <select class="time-select" id="sel-hour">${hours.map(h=>`<option value="${parseInt(h)}" ${parseInt(h)===alarmHour?'selected':''}>${h}</option>`).join('')}</select>
        </div>
        <div class="time-sep">:</div>
        <div class="time-col">
          <div class="time-col-label">분</div>
          <select class="time-select" id="sel-min">${mins.map(m=>`<option value="${parseInt(m)}" ${parseInt(m)===alarmMin?'selected':''}>${m}</option>`).join('')}</select>
        </div>
      </div>
      <div class="modal-btn-row">
        <button class="modal-cancel" onclick="closeTimeModal()">취소</button>
        <button class="modal-confirm" onclick="confirmTime()">확인</button>
      </div>
    </div>
  `;
  screen.appendChild(modal);
}
function closeTimeModal(){const m=document.getElementById('time-modal');if(m)m.remove();}
function confirmTime(){
  alarmHour=parseInt(document.getElementById('sel-hour').value);
  alarmMin=parseInt(document.getElementById('sel-min').value);
  closeTimeModal();
  showToast(`⏰ ${String(alarmHour).padStart(2,'0')}:${String(alarmMin).padStart(2,'0')}으로 설정됐어요`);
  render();
}

function closeDetail(){selectedNews=null;render();}
function toggleSave(id){savedIds=savedIds.includes(id)?savedIds.filter(i=>i!==id):[...savedIds,id];render();}
function toggleTerm(el){const a=el.querySelector('.term-answer');a.style.display=a.style.display==='block'?'none':'block';}
function switchTab(t){tab=t;render();}
function toggleInterest(i){activeInterests=activeInterests.includes(i)?activeInterests.filter(x=>x!==i):[...activeInterests,i];render();}
function setFont(s){fontSize=s;render();}
function logout(){isLoggedIn=false;isGuest=false;guestDetailUsed=false;readIds=[];savedIds=[];render();}

function updateTabs(){
  ['home','saved','setting'].forEach(t=>{
    const ti=document.getElementById(`ti-${t}`);
    const tl=document.getElementById(`tl-${t}`);
    const td=document.getElementById(`td-${t}`);
    if(ti)ti.classList.toggle('on',t===tab);
    if(tl)tl.classList.toggle('on',t===tab);
    if(td)td.style.display=t===tab?'block':'none';
  });
}

function render(){
  const screen=document.getElementById('screen');
  const tabbar=document.getElementById('tabbar');
  if(!isLoggedIn&&!isGuest){renderLogin();return;}
  tabbar.style.display=selectedNews?'none':'flex';
  if(selectedNews){renderDetail(screen);return;}
  if(tab==='home')renderHome(screen);
  if(tab==='saved')renderSaved(screen);
  if(tab==='setting')renderSetting(screen);
  updateTabs();
}

loadNews().then(function() { render(); });
</script>
</body>
</html>
